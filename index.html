<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>骰子挑戰遊戲 - Dice Dare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎲 骰子挑戰遊戲 🎲</h1>
    <p class="subtitle">擲骰淘汰挑戰 — 隨時可以停，但剩低嘅就要做！</p>

    <!-- Setup View -->
    <div id="setupView">
      <div class="room-section">
        <h2>🎮 設定挑戰內容</h2>
        <div id="daresSetup">
          <div id="dareInputs"></div>
          <div class="button-row">
            <button class="btn btn-secondary" id="addDareBtn">➕ 新增挑戰</button>
            <button class="btn btn-danger" id="removeDareBtn">➖ 移除最後一個</button>
          </div>
        </div>
        <div class="button-row" style="margin-top:20px;">
          <button class="btn" id="startGameBtn">🎲 開始遊戲</button>
          <button class="btn btn-secondary" id="generateLinkBtn">🔗 產生分享連結</button>
        </div>
        <div id="shareLinkArea" class="hidden" style="margin-top:20px;">
          <label>分享此連結給其他人：</label>
          <div class="share-link-box">
            <input type="text" id="shareLinkInput" readonly>
            <button class="btn" id="copyLinkBtn">📋 複製</button>
          </div>
        </div>
      </div>

      <div class="room-section rules-box">
        <h3>📖 遊戲規則</h3>
        <ul>
          <li>GM 設定好挑戰清單後開始遊戲</li>
          <li>Roller 按<strong>「擲骰子」</strong>→ 骰到的數字對應的挑戰會被<strong>淘汰</strong></li>
          <li>已淘汰的數字不會再出現，唔會浪費時間</li>
          <li>Roller 隨時可以按<strong>「停！接受懲罰」</strong>→ 從剩餘挑戰中隨機抽一個</li>
          <li>如果只剩 1 個挑戰，自動成為最終懲罰！</li>
        </ul>
      </div>
    </div>

    <!-- Game View -->
    <div id="gameView" class="hidden">
      <!-- Dare Grid -->
      <div class="room-section">
        <h3>挑戰列表 <span class="remaining-badge">剩餘: <span id="remainingCount">0</span></span></h3>
        <div id="dareGrid" class="dare-grid"></div>
      </div>

      <!-- Dice + Controls -->
      <div class="dice-section">
        <div class="dice-container">
          <div class="dice" id="diceDisplay">?</div>
        </div>
        <div id="lastRollMsg" class="last-roll-msg"></div>
        <div class="game-buttons">
          <button class="btn btn-roll" id="rollBtn">🎲 擲骰子</button>
          <button class="btn btn-stop" id="stopBtn">🛑 停！接受懲罰</button>
        </div>
      </div>

      <!-- Roll History -->
      <div class="room-section">
        <h3>📜 淘汰紀錄 <span class="rolled-badge">已擲: <span id="rolledCount">0</span></span></h3>
        <div id="rollHistory"></div>
      </div>

      <div class="button-row" style="justify-content:center;margin-top:20px;">
        <button class="btn btn-secondary" id="resetBtn">🔄 重新開始</button>
        <button class="btn btn-secondary" id="backToSetupBtn">⬅ 返回設定</button>
      </div>
    </div>

    <!-- Final Result Modal -->
    <div id="resultModal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <h2>🎯 最終懲罰！</h2>
        <div class="final-dare-number" id="finalDareNumber"></div>
        <div class="final-dare-text" id="finalDareText"></div>
        <div class="button-row" style="justify-content:center;margin-top:25px;">
          <button class="btn" id="modalCloseBtn">確認</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
